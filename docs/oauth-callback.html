<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completing Sign In | Rare Earth Rescue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-auth-page="oauth-callback" class="home-page auth-page-body">
    <main class="page">
      <section class="section shell auth-shell auth-shell-centered">
        <div class="auth-page-layout auth-page-layout-centered">
          <div class="auth-card auth-card-centered panel reveal">
            <div class="verify-panel-copy">
              <span class="plan-badge">Secure redirect</span>
              <h1 class="auth-title" style="font-size: clamp(1.9rem, 3vw, 2.6rem);">Completing your secure sign-in</h1>
              <p class="auth-subcopy">
                Rare Earth Rescue is finalizing your authentication with Clerk and redirecting you back into the platform.
              </p>
            </div>
            <div class="callback-loader" aria-hidden="true"></div>
            <div id="oauth-callback-feedback" class="auth-feedback" hidden></div>
          </div>
        </div>
      </section>
    </main>

    <script src="clerk-config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
